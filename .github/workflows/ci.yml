name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint, typecheck & test
        run: pnpm check

      # pnpm check already typechecks (astro check), so build bare — no redundant re-check.
      - name: Build
        run: pnpm exec astro build

      # axe + e2e run the built site in a real browser (contrast, keyboard,
      # hydration — things the linter can't see). Install Chromium fresh each run:
      # Playwright's own CI guide recommends this, and for a single browser it's a
      # few seconds. Version-keyed caching saves little here and buys real failure
      # modes (a poisoned cache never self-heals; new PR branches miss it anyway).
      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Accessibility & e2e tests
        run: pnpm test:e2e
