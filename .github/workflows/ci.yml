name: CI

on:
  pull_request:
  workflow_dispatch:


jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint, typecheck & test
        run: pnpm check

      # pnpm check already typechecks (astro check), so build bare — no redundant re-check.
      - name: Build
        run: pnpm exec astro build
