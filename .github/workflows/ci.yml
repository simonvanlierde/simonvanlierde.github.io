name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint, typecheck & test
        run: pnpm check

      # pnpm check already typechecks (astro check), so build bare — no redundant re-check.
      - name: Build
        run: pnpm exec astro build

      # axe + e2e run the built site in a real browser (contrast, keyboard, hydration —
      # things the linter can't see). Cache the browser binary keyed on the resolved
      # Playwright version so only version bumps re-download it (~100 MB).
      - name: Resolve Playwright version
        run: echo "PW_VERSION=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_ENV"

      - name: Cache Playwright browser
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ env.PW_VERSION }}

      - name: Install Playwright (browser on cache miss, OS deps always)
        run: |
          if [ "${{ steps.pw-cache.outputs.cache-hit }}" = "true" ]; then
            pnpm exec playwright install-deps chromium
          else
            pnpm exec playwright install --with-deps chromium
          fi

      - name: Accessibility & e2e tests
        run: pnpm test:e2e
