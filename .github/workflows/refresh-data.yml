name: Refresh RELab stats

# Pulls fresh figures from the RELab /stats endpoint into src/data/stats.json,
# then builds and deploys so the new numbers reach the live site.
#
# We deploy within this run rather than relying on the commit to trigger
# deploy.yml: pushes made with the default GITHUB_TOKEN do not trigger other
# workflows, so an auto-commit would otherwise never redeploy.

on:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write # commit the refreshed snapshot
  pages: write # deploy to Pages
  id-token: write # OIDC for deploy-pages

# Serialise with deploy.yml (same group) so deploys don't race; don't cancel an
# in-progress deployment.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fetch stats
        run: pnpm fetch:stats

      - name: Commit refreshed snapshot if changed
        run: |
          if git diff --quiet -- src/data/stats.json; then
            echo "No change in src/data/stats.json."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/stats.json
          git commit -m "chore: refresh RELab stats"
          # Rebase onto any commits that landed while this job ran, then push.
          git pull --rebase --autostash origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"

      - name: Build with Astro
        run: pnpm build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
